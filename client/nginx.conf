server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls directly to the backend
    location /auth/   { proxy_pass http://server:4000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /tournaments/ { proxy_pass http://server:4000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /players/ { proxy_pass http://server:4000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /rounds/  { proxy_pass http://server:4000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /fide/    { proxy_pass http://server:4000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /health   { proxy_pass http://server:4000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
