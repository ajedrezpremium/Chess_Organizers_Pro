services:
  - type: web
    name: chess-organizers-api
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: node server/src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES
        value: 7d
      - key: DB_PATH
        value: ./data/chessorganizers.db
      - key: CORS_ORIGIN
        value: https://chess-organizers-pro.vercel.app
      - key: PUBLIC_URL
        value: https://chess-organizers-pro.vercel.app
      - key: FIDE_API_KEY
        sync: false
