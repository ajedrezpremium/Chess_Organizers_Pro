services:
  app:
    build: .
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DB_PATH=/data/chessorganizers.db
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - PUBLIC_URL=${PUBLIC_URL:-https://chessorganizers.example.com}
      - CLIENT_DIST=/app/client/dist
      - CORS_ORIGIN=${CORS_ORIGIN:-https://chessorganizers.example.com}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_BASIC=${STRIPE_PRICE_BASIC:-}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - FIDE_API_KEY=${FIDE_API_KEY:-}
      - FIDE_SUBMIT_URL=${FIDE_SUBMIT_URL:-}
    volumes:
      - chess_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - chessnet

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-chessorganizers.example.com}
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    command: /bin/sh -c "envsubst '$${DOMAIN}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - chessnet

volumes:
  chess_data:

networks:
  chessnet:
